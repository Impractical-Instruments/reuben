<!doctype html>
<!--
  Throwaway demo/harness page for the reuben web player (issue #224). No framework,
  no bundler — exercises js/reuben-engine.mjs against the real WASM engine
  (crates/reuben-web/src/bridge.rs).

  Serving requires staging two things next to the sources (neither is committed):

    cd crates/reuben-web
    cargo build --release --target wasm32-unknown-unknown
    cp target/wasm32-unknown-unknown/release/reuben_web.wasm js/
    ln -s ../../../instruments web/instruments     # or: cp -r ../../instruments web/
    ln -s ../../reuben-core/schema/instrument.schema.json web/schema.json
    python3 -m http.server -d .
    # open http://localhost:8000/web/

  The schema symlink feeds the auto-UI: main.js fetches ./schema.json once and
  buildSurface()s a control surface for each loaded instrument. Both symlinks are
  gitignored (see web/.gitignore) and re-created by this recipe, never committed.

  Serve from crates/reuben-web (-d .), NOT from web/: main.js imports ../js/ modules,
  which must be inside the served root. A real iPhone additionally needs a secure
  context (e.g. `cloudflared tunnel --url http://localhost:8000`).
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>reuben web player — harness</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; max-width: 42rem; }
    h1 { font-size: 1.2rem; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin: 0.75rem 0; }
    button, select { font-size: 1rem; padding: 0.4rem 0.9rem; }
    label { font-size: 0.9rem; }
    #status { margin: 0.75rem 0; font-weight: 600; }
    #status.ok { color: #2a7a2a; }
    #status.bad { color: #b02020; }
    /* The generated auto-UI mounts here; render.mjs injects its own grid styles into
       <head>. This just gives the container breathing room within the harness. */
    #surface { margin: 1rem 0; }
    #log {
      background: #f4f4f4; border: 1px solid #ccc; padding: 0.5rem;
      font-size: 0.8rem; white-space: pre-wrap; overflow-x: auto;
      max-height: 20rem; overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>reuben web player — throwaway harness (#224)</h1>

  <div class="row">
    <select id="instrument">
      <option>default</option>
      <option>metronome</option>
      <option>echo</option>
      <option>vibrato</option>
      <option>reverb</option>
      <option>sequence</option>
      <option>scale-demo</option>
      <option>autotune</option>
      <option>sampler</option>
      <option>sampler-arp</option>
      <option>good-button</option>
      <option>auto-filter</option>
      <option>djfilter-demo</option>
      <option>chord-player</option>
      <option>groovebox</option>
      <option>strum-harp</option>
      <option>euclidean-drums</option>
      <option>stereo-autopan</option>
      <option>nested-space</option>
      <option>mic-space</option>
      <option>granulator-demo</option>
      <option>resonator-demo</option>
    </select>
    <button id="load" disabled>Load</button>
  </div>

  <div class="row">
    <button id="start" disabled>Start</button>
    <button id="mic" disabled>Mic</button>
  </div>

  <!-- The auto-generated control surface for the loaded instrument (issue #225). Built
       by js/surface/render.mjs from buildSurface() — replaces the old hardcoded tempo
       slider + Note button, which only fit a couple of instruments. -->
  <div id="surface"></div>

  <!-- A Load clicked before Start can appear to stall on some browsers: a suspended
       context may not run the worklet's message handler until resume() (P1 finding).
       It self-recovers on Start; the status line below hints at it. -->
  <div id="status">Pre-staging… (if a Load seems stuck, press Start — a suspended
    context may not deliver worklet messages until resumed)</div>
  <pre id="log"></pre>

  <script type="module" src="./main.js"></script>
</body>
</html>
