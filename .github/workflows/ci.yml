name: CI

on:
  push:
    branches: [main]
    # Docs-only changes can't affect the Rust build/test/perf gate — skip CI for them.
    # `paths-ignore` skips only when EVERY changed file matches, so a mixed docs+code
    # change still runs. Safe to skip silently: no ruleset requires these status checks
    # (verified 2026-06-23) — a doc-only PR stays mergeable without a CI run.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - LICENSE
  pull_request:
    # `ready_for_review` so converting a draft to ready triggers a run.
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - LICENSE

# Cancel superseded runs on the same ref so the latest push wins and minutes aren't wasted.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lockstep:
    name: MSRV lockstep (toolchain == rust-version)
    runs-on: ubuntu-latest
    # Same draft-skip as the other jobs. Pure text check — no toolchain, seconds to run.
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - name: Assert rust-toolchain.toml channel == Cargo.toml rust-version (ADR-0023)
        run: ./.github/scripts/check-msrv-lockstep.sh

  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    # Skip draft PRs; always run on push to main (which has no pull_request payload).
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0 # faster, smaller cache on CI's cold builds
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA dev headers (cpal, for reuben-native)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev

      # Single source of truth = rust-toolchain.toml (ADR-0023); the composite
      # installs + caches the pinned channel. No version hardcoded here.
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  bench:
    name: perf gate (render_block Ir)
    runs-on: ubuntu-latest
    # Same draft-skip as `check`. Runs in parallel — nobody waits on valgrind for fmt/test.
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the baseline commit (PR base / previous push) in history

      - name: Install valgrind (callgrind backend for iai-callgrind)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends valgrind

      # Same pinned toolchain as `check`, via the shared composite (ADR-0023).
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      # The runner binary must match the iai-callgrind dev-dependency (0.16.x).
      - name: Cache iai-callgrind-runner
        id: iai-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/iai-callgrind-runner
          key: iai-callgrind-runner-0.16.1-${{ runner.os }}
      - name: Install iai-callgrind-runner
        if: steps.iai-cache.outputs.cache-hit != 'true'
        run: cargo install iai-callgrind-runner --version 0.16.1

      - name: Resolve baseline ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sha="${{ github.event.pull_request.base.sha }}"
          else
            sha="${{ github.event.before }}"
            # New branch / first push reports a null SHA; fall back to the first parent.
            case "$sha" in ""|0000000000000000000000000000000000000000)
              sha="$(git rev-parse HEAD~1 2>/dev/null || echo '')" ;;
            esac
          fi
          echo "sha=$sha" >>"$GITHUB_OUTPUT"

      - name: Compare render_block instruction counts vs baseline
        run: ./.github/scripts/perf-gate.sh "${{ steps.base.outputs.sha }}"
