name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    # `ready_for_review` so converting a draft to ready triggers a run.
    types: [opened, synchronize, reopened, ready_for_review]

# Path filtering is per-JOB, not workflow-level (see the `changes` job): each gate runs only when a
# file that can move ITS outcome changed — code under test, test/bench DATA (instruments/), or the
# infra that builds/runs it. The old workflow-level `paths-ignore` was removed so a partial or mixed
# change routes to exactly the affected jobs instead of the all-or-nothing blanket skip. A change
# that touches no gated path (docs-only, LICENSE, …) leaves every filtered job Skipped; the
# `ci-passed` aggregate job below still reports green (it counts a Skipped upstream as a pass), so the
# PR stays mergeable. The `dev` ruleset requires `ci-passed` — never the filtered jobs directly,
# because a Skipped filtered job reads to a ruleset as an unmet "expected but missing" required check.

# Cancel superseded runs on the same ref so the latest push wins and minutes aren't wasted —
# EXCEPT pushes to main and dev. Every commit on those two branches must get its own run so the perf
# gate records a history point for each (layer 1) — main to the `bench-history` branch, dev
# to `bench-history-dev`; cancelling an in-progress or queued run punches a hole in the trend on rapid
# pushes/merges. So main and dev pushes get a SHA-unique group (nothing to cancel against) with
# cancellation off; PR and other branch runs keep per-ref grouping and still cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && format('-{0}', github.sha) || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

permissions:
  contents: read

jobs:
  # Diff the change against the PR base (pull_request) or the before-SHA (push) and expose one
  # boolean per downstream job, so each gate below runs only when a path it cares about changed.
  # Seconds-long and always runs (even on drafts) — the expensive jobs it feeds carry the draft skip.
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      lockstep: ${{ steps.filter.outputs.lockstep }}
      check: ${{ steps.filter.outputs.check }}
      windows: ${{ steps.filter.outputs.windows }}
      bench: ${{ steps.filter.outputs.bench }}
      rules: ${{ steps.filter.outputs.rules }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            # Anchor: any change that can move the Rust workspace build/test/perf outcome. Shared by
            # the three `--workspace` jobs (check, windows, bench) — every crate transitively depends
            # on reuben-contract, so a `--workspace` gate has no sound per-crate split. instruments/ is
            # test + bench DATA (include_str!/include_bytes! + fs-resolved fixtures), so it lives here;
            # .cargo/config.toml sets the build's target-cpu (and perf-gate snapshots it); the workflow
            # + the shared toolchain composite are the infra that runs every job.
            _workspace: &workspace
              - 'crates/reuben-contract/**'
              - 'crates/reuben-macros/**'
              - 'crates/reuben-core/**'
              - 'crates/reuben-native/**'
              - 'crates/reuben-mcp/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/config.toml'
              - 'instruments/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-rust/**'
            # Pure text check: the pin, the MSRV declaration it must equal, and its own
            # script. Nothing else can red it. (It used to also gate on the detached reuben-web
            # crate's own rust-version; that crate left with the extraction.)
            lockstep:
              - 'rust-toolchain.toml'
              - 'Cargo.toml'
              - '.github/scripts/check-msrv-lockstep.sh'
              - '.github/workflows/ci.yml'
            # fmt + clippy + workspace test, PLUS the skill Python suites (control-surface today), so
            # a skill-only change still re-runs its tests. (The control-surface suite reads committed
            # instruments/ — covered by *workspace — but no committed surfaces/, so no surfaces/ trigger.)
            check:
              - *workspace
              - '.claude/skills/**'
            windows:
              - *workspace
            # The perf gate benches the same workspace closure; add its own gate script. .cargo/
            # config.toml is already in the anchor (perf-gate.sh snapshots it into the baseline build).
            bench:
              - *workspace
              - '.github/scripts/perf-gate.sh'
            # Rules-doc system (docs/rules/ + its guard scripts + hooks). A docs-only rules change
            # touches nothing in *workspace, so check/windows/bench all skip and `ci-passed` would
            # green vacuously — the derive + links guards would never run. This dedicated gate makes
            # them execute on their own path set. ci.yml is here too so a change to the gate re-runs it.
            rules:
              - 'docs/rules/**'
              - 'scripts/check_rules_derive.py'
              - 'scripts/check_rules_links.py'
              - 'scripts/check_rules_refs.py'
              - 'scripts/test_check_rules_*.py'
              - 'scripts/hooks/**'
              - '.github/workflows/ci.yml'

  lockstep:
    name: MSRV lockstep (toolchain == rust-version)
    runs-on: ubuntu-latest
    needs: changes
    # Same draft-skip as the other jobs, now AND'd with its path gate. Pure text check — no toolchain,
    # seconds to run.
    if: needs.changes.outputs.lockstep == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assert rust-toolchain.toml channel == Cargo.toml rust-version
        run: ./.github/scripts/check-msrv-lockstep.sh

  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    needs: changes
    # Skip draft PRs; always run on push to main (which has no pull_request payload). Gated on a
    # workspace-code or skill change.
    if: needs.changes.outputs.check == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0 # faster, smaller cache on CI's cold builds
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install ALSA dev headers (cpal, for reuben-native)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev

      # Single source of truth = rust-toolchain.toml; the composite
      # installs + caches the pinned channel. No version hardcoded here.
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format
        run: cargo fmt --all --check

      # `--features reuben-core/bench` so clippy lints the per-operator micro-bench code (#30): its
      # `[[bench]]` targets declare `required-features = ["bench"]`, so without the flag
      # `--all-targets` silently skips them.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --features reuben-core/bench -- -D warnings

      # Same flag so the #30 forcing-function tests run (they live in the feature-gated
      # `bench_support` module): they red CI if a new operator lacks a micro-bench workload, or if
      # the iai gate list drifts from it.
      - name: Test
        run: cargo test --workspace --features reuben-core/bench

      # Skill scripts that inline an engine contract ship their own Python tests (control-surface's
      # `gen_surface.py` today); its live-engine boundary test runs `reuben describe` via `cargo
      # run` to catch format drift (#233) instead of letting the skill rot silently. That `cargo
      # run` uses the same `--features reuben-core/bench` as the clippy/test steps above, so it
      # reuses their compiled artifacts rather than triggering a featureless rebuild. Generic over
      # the skills dir so a future skill's `test_*.py` is picked up without editing CI; each suite
      # runs from its own dir because the tests import their script by bare module name.
      - name: Skill tests (Python)
        run: |
          for d in .claude/skills/*/; do
            if ls "$d"test_*.py >/dev/null 2>&1; then
              echo "== $d ==" && (cd "$d" && python3 -m unittest)
            fi
          done

  windows:
    name: build + test (windows)
    runs-on: windows-latest
    needs: changes
    # Same draft-skip as `check`, AND'd with the workspace path gate. Proves the build + non-audio
    # logic on Windows: a headless runner can't init WASAPI, so audio out is verified by
    # a manual smoke pass on real hardware — not here. fmt/clippy/lockstep are
    # platform-independent and stay ubuntu-only (`check`); no need to re-run them.
    # No ALSA install: cpal links WASAPI on Windows, and tests open no device.
    if: needs.changes.outputs.windows == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -D warnings # catch platform-gated warnings the Linux build can't see
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same pinned toolchain as `check`, via the shared composite.
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build
        run: cargo build --workspace

      # `--features reuben-core/bench` for parity with `check`: compiles `bench_support` + runs the
      # #30 forcing-function tests on Windows too.
      - name: Test
        run: cargo test --workspace --features reuben-core/bench

  bench:
    name: perf gate (macro + micro Ir)
    runs-on: ubuntu-latest
    needs: changes
    # Same draft-skip as `check`, then the path gate OR an unconditional run on every push to main/dev.
    # The path gate alone punched holes in the bench trend: a push to main/dev that moved no benched
    # path (docs-only, rules-doc, …) skipped this job, so `bench-history` below found no artifact and
    # recorded no point. Recording a history point for EVERY main/dev push is the intent the
    # concurrency block already encodes (SHA-unique group, cancellation off); this clause makes the
    # per-job gate honor it. PRs and other-branch pushes stay purely path-gated. Runs in parallel —
    # nobody waits on valgrind for fmt/test.
    if: >-
      (github.event_name == 'push' || github.event.pull_request.draft == false)
      && (needs.changes.outputs.bench == 'true'
          || (github.event_name == 'push'
              && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')))
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need the baseline commit (PR base / previous push) in history

      # Cache the valgrind .deb so the slow apt-get update + download are skipped
      # on a hit, mirroring the iai-callgrind-runner cache below.
      - name: Cache valgrind .deb
        id: vg-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/valgrind-debs
          # Bump the trailing version to force a refresh of the cached package.
          key: valgrind-deb-1-${{ runner.os }}
      - name: Download valgrind .deb (cache miss)
        if: steps.vg-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          mkdir -p ~/valgrind-debs
          cd ~/valgrind-debs && apt-get download valgrind
      - name: Install valgrind (callgrind backend for iai-callgrind)
        run: sudo apt-get install -y --no-install-recommends ~/valgrind-debs/*.deb

      # Same pinned toolchain as `check`, via the shared composite.
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # The runner binary must match the iai-callgrind dev-dependency (0.16.x).
      - name: Cache iai-callgrind-runner
        id: iai-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cargo/bin/iai-callgrind-runner
          key: iai-callgrind-runner-0.16.1-${{ runner.os }}
      - name: Install iai-callgrind-runner
        if: steps.iai-cache.outputs.cache-hit != 'true'
        run: cargo install iai-callgrind-runner --version 0.16.1

      - name: Resolve baseline ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sha="${{ github.event.pull_request.base.sha }}"
          else
            sha="${{ github.event.before }}"
            # New branch / first push reports a null SHA; fall back to the first parent.
            case "$sha" in ""|0000000000000000000000000000000000000000)
              sha="$(git rev-parse HEAD~1 2>/dev/null || echo '')" ;;
            esac
          fi
          echo "sha=$sha" >>"$GITHUB_OUTPUT"

      - name: Compare instruction counts vs baseline (macro render_block + per-operator process)
        run: ./.github/scripts/perf-gate.sh "${{ steps.base.outputs.sha }}"

      # Hand the harvested per-case Ir record (layer 1) to the persist job. `always()` so a
      # commit that redded the gate is still recorded — its Ir is valid history. `ignore` when the
      # harness didn't compile against its baseline (no comparison ran): an honest gap, not a failure.
      - name: Upload bench-history record
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-history-record
          path: bench-history-record.jsonl
          if-no-files-found: ignore
          retention-days: 7

  # Rules-doc guards (S01). The rules-doc system's derive + links guards are stdlib-only Python. Same
  # draft-skip as the Rust jobs; `python3` is preinstalled on ubuntu-latest, so no setup step. Gated on
  # the `rules` path filter (see the `changes` job) — a docs-only rules change moves none of the
  # *workspace jobs, so without this gate `ci-passed` would green vacuously and the invariant would
  # never be enforced. (The reference-linter is NOT here — it scans ALL code, not just docs/rules, so
  # it runs unconditionally in the always-on `ref-guard` job below; wired in S19/#185 now that the
  # code is clean.)
  rules-guards:
    name: rules-doc guards
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rules == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Mirror the "Skill tests" idiom: run each guard's unit suite from scripts/ so the tests can
      # import their module by bare name.
      - name: Guard unit tests
        run: cd scripts && python3 -m unittest discover -p 'test_check_rules_*.py' -v

      # Backstop for the pre-commit hook's `--write` collation: fail if README's derived sections
      # drifted from the topic docs.
      - name: Derive-drift guard
        run: python3 scripts/check_rules_derive.py --check .

      # The epic's core invariant: every topic has >=1 rule; every rule links exactly one rationale
      # that exists. (check_rules_refs.py runs separately in the always-on ref-guard job — it scans
      # all code, not just docs/rules.)
      - name: Rule<->rationale link guard
        run: python3 scripts/check_rules_links.py .

  # The rules reference-linter (check_rules_refs.py, S01 + wired in S19/#185): no ADR-NNNN survives in
  # code, and every `see rules: <topic>` comment resolves to a real topic doc. Unlike the derive/link
  # guards (path-filtered to docs/rules/**), a reintroduced ADR ref or a broken topic pointer can hide
  # in ANY code change, so this ALWAYS runs. The absorb-adrs skill — the tool that stamps `Distilled
  # from:` provenance — is exempt by the guard's SKILL_ALLOWLIST.
  ref-guard:
    name: no ADR refs in code (rules ref-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: ADR-in-code + pointer-resolution guard
        run: python3 scripts/check_rules_refs.py .

  # The Sample-alias guard (check_sample_alias.py, #560): the engine's audio element type is named
  # once in crates/reuben-core/src/signal.rs, and a raw f32 slice or vector buffer form may appear
  # only there or in the script's justified allowlist (device layer, resource decode, operator DSP
  # arithmetic, test/bench harnesses). Like `ref-guard`, a stray raw buffer can slip into ANY code
  # change, so this ALWAYS runs (stdlib-only Python; no toolchain setup). Its unit suite runs here
  # too so the guard can't silently rot. Gates merges via `ci-passed`'s `needs`.
  sample-guard:
    name: no raw f32 buffers (sample-alias guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Guard unit test
        run: cd scripts && python3 -m unittest test_check_sample_alias -v
      - name: Sample-alias guard (single naming site for the audio element type)
        run: python3 scripts/check_sample_alias.py .

  # Always-green aggregate merge gate. A ruleset can't require the per-path-filtered jobs above
  # directly: when a job is Skipped (nothing it gates changed) the ruleset reads it as "expected but
  # never reported" and wedges the PR (see the comment at the top of this file). So the `dev` ruleset
  # requires THIS one job instead. It `needs` every merge-gating job and, with `if: always()`, runs
  # even when they skip — failing only if a required upstream reported `failure`/`cancelled`. A
  # Skipped upstream is a pass. Deliberately NOT in `needs`: `deploy-web` and `bench-history` are
  # post-merge side-effects (deploy/persist), not merge gates.
  ci-passed:
    # This `name` is the exact string the `dev` ruleset requires as a status check (GitHub matches
    # required checks by a job's `name`, not its id) — keep it equal to `ci-passed` so the ruleset,
    # this workflow and CONTRIBUTING refer to the check by one name.
    name: ci-passed
    runs-on: ubuntu-latest
    needs: [changes, lockstep, check, windows, bench, rules-guards, ref-guard, sample-guard]
    if: always()
    steps:
      - name: Fail if any required job failed or was cancelled (skipped is OK)
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "upstream results: $results"
          for r in $results; do
            case "$r" in
              failure|cancelled)
                echo "::error::A required CI job reported '$r'"; exit 1 ;;
            esac
          done
          echo "All required jobs passed or were skipped."

  # Persist the benchmark trend (layer 1). The ONLY job granted `contents: write`; the gate
  # above stays read-only. Records each commit's absolute Ir to a per-branch orphan branch: main to
  # `bench-history`, dev to `bench-history-dev` (never main/dev themselves — no tree churn, no CI
  # re-trigger). The two trends are fully isolated, so watching dev's trend before promoting to main
  # never touches main's series. `needs: bench` + `always()` so the point is recorded even when the
  # gate failed; never runs for PRs or forks. `bench` now runs unconditionally on every main/dev push
  # (its `if` above), so on these branches the artifact is always present and every push records a
  # point — no path-skip gaps. The download stays `continue-on-error` as a belt-and-suspenders guard:
  # if the harness ever fails to emit an artifact, the append script no-ops rather than redding here.
  bench-history:
    name: persist bench history
    runs-on: ubuntu-latest
    needs: bench
    if: ${{ always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download bench-history record
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bench-history-record
          path: _bench_rec
        continue-on-error: true # no artifact (harness didn't run) => append script no-ops
      # Route to the branch's own orphan trend: dev -> bench-history-dev, everything else (main) ->
      # bench-history. The label is the human name the dashboard prints in its copy.
      - name: Append to bench-history branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HIST_BRANCH: ${{ github.ref == 'refs/heads/dev' && 'bench-history-dev' || 'bench-history' }}
          HIST_LABEL: ${{ github.ref == 'refs/heads/dev' && 'dev' || 'main' }}
        run: ./.github/scripts/bench-history-append.sh _bench_rec/bench-history-record.jsonl "$HIST_BRANCH" "$HIST_LABEL"
