name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `ready_for_review` so converting a draft to ready triggers a run.
    types: [opened, synchronize, reopened, ready_for_review]

# Path filtering is per-JOB, not workflow-level (see the `changes` job): each gate runs only when a
# file that can move ITS outcome changed — code under test, test/bench DATA (instruments/), or the
# infra that builds/runs it. The old workflow-level `paths-ignore` was removed so a partial or mixed
# change routes to exactly the affected jobs instead of the all-or-nothing blanket skip. A change
# that touches no gated path (docs-only, LICENSE, …) leaves every job Skipped and the PR mergeable —
# safe because no ruleset requires these status checks (verified 2026-06-23). If that ever changes,
# a filtered job's "Skipped" would read as an unmet required check: add an always-green aggregator
# job and require THAT instead, rather than requiring the filtered jobs directly.

# Cancel superseded runs on the same ref so the latest push wins and minutes aren't wasted —
# EXCEPT pushes to main. Every main commit must get its own run so the perf gate records a history
# point for each (ADR-0019, layer 1); cancelling an in-progress or queued main run punches a hole in
# the trend on rapid pushes/merges. So main pushes get a SHA-unique group (nothing to cancel against)
# with cancellation off; PR and branch runs keep per-ref grouping and still cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}${{ github.ref == 'refs/heads/main' && format('-{0}', github.sha) || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Diff the change against the PR base (pull_request) or the before-SHA (push) and expose one
  # boolean per downstream job, so each gate below runs only when a path it cares about changed.
  # Seconds-long and always runs (even on drafts) — the expensive jobs it feeds carry the draft skip.
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      lockstep: ${{ steps.filter.outputs.lockstep }}
      check: ${{ steps.filter.outputs.check }}
      windows: ${{ steps.filter.outputs.windows }}
      web: ${{ steps.filter.outputs.web }}
      webapp: ${{ steps.filter.outputs.webapp }}
      bench: ${{ steps.filter.outputs.bench }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Anchor: any change that can move the Rust workspace build/test/perf outcome. Shared by
            # the three `--workspace` jobs (check, windows, bench) — every crate transitively depends
            # on reuben-contract, so a `--workspace` gate has no sound per-crate split. instruments/ is
            # test + bench DATA (include_str!/include_bytes! + fs-resolved fixtures), so it lives here;
            # .cargo/config.toml sets the build's target-cpu (and perf-gate snapshots it); the workflow
            # + the shared toolchain composite are the infra that runs every job.
            _workspace: &workspace
              - 'crates/reuben-contract/**'
              - 'crates/reuben-macros/**'
              - 'crates/reuben-core/**'
              - 'crates/reuben-native/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/config.toml'
              - 'instruments/**'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-rust/**'
            # Pure text check (ADR-0023): the pin, the two MSRV declarations it must equal (root
            # workspace + the detached reuben-web), and its own script. Nothing else can red it.
            lockstep:
              - 'rust-toolchain.toml'
              - 'Cargo.toml'
              - 'crates/reuben-web/Cargo.toml'
              - '.github/scripts/check-msrv-lockstep.sh'
              - '.github/workflows/ci.yml'
            # fmt + clippy + workspace test, PLUS the skill Python suites (control-surface today), so
            # a skill-only change still re-runs its tests.
            check:
              - *workspace
              - '.claude/skills/**'
            windows:
              - *workspace
            # reuben-web is a DETACHED crate (its own [workspace]): its gate is its own build closure
            # — itself + reuben-core + the crates reuben-core pulls (reuben-macros, reuben-contract) —
            # and NOT reuben-native, which it never links. It renders instrument DATA in its host tests
            # and Node matrix harness, so instruments/ counts. Its Cargo.lock lives under its own dir,
            # already covered by `crates/reuben-web/**`.
            web:
              - 'crates/reuben-web/**'
              - 'crates/reuben-core/**'
              - 'crates/reuben-macros/**'
              - 'crates/reuben-contract/**'
              - 'instruments/**'
              - '.cargo/config.toml'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-rust/**'
            # The /web player app (ADR-0041, issue #226): its build/smoke closure is the app
            # itself PLUS everything the staging script pulls — the reuben-web wasm (built from
            # reuben-core + its macro/contract deps), the instrument documents + transitive
            # resources it stages, and the schema under reuben-core. Same engine closure as
            # `web`, plus web/**.
            webapp:
              - 'web/**'
              - 'crates/reuben-web/**'
              - 'crates/reuben-core/**'
              - 'crates/reuben-macros/**'
              - 'crates/reuben-contract/**'
              - 'instruments/**'
              - '.cargo/config.toml'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-rust/**'
            # The perf gate benches the same workspace closure; add its own gate script. .cargo/
            # config.toml is already in the anchor (perf-gate.sh snapshots it into the baseline build).
            bench:
              - *workspace
              - '.github/scripts/perf-gate.sh'

  lockstep:
    name: MSRV lockstep (toolchain == rust-version)
    runs-on: ubuntu-latest
    needs: changes
    # Same draft-skip as the other jobs, now AND'd with its path gate. Pure text check — no toolchain,
    # seconds to run.
    if: needs.changes.outputs.lockstep == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    steps:
      - uses: actions/checkout@v4
      - name: Assert rust-toolchain.toml channel == Cargo.toml rust-version (ADR-0023)
        run: ./.github/scripts/check-msrv-lockstep.sh

  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    needs: changes
    # Skip draft PRs; always run on push to main (which has no pull_request payload). Gated on a
    # workspace-code or skill change.
    if: needs.changes.outputs.check == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0 # faster, smaller cache on CI's cold builds
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA dev headers (cpal, for reuben-native)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev

      # Single source of truth = rust-toolchain.toml (ADR-0023); the composite
      # installs + caches the pinned channel. No version hardcoded here.
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      # `--features reuben-core/bench` so clippy lints the per-operator micro-bench code (#30): its
      # `[[bench]]` targets declare `required-features = ["bench"]`, so without the flag
      # `--all-targets` silently skips them.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --features reuben-core/bench -- -D warnings

      # Same flag so the #30 forcing-function tests run (they live in the feature-gated
      # `bench_support` module): they red CI if a new operator lacks a micro-bench workload, or if
      # the iai gate list drifts from it.
      - name: Test
        run: cargo test --workspace --features reuben-core/bench

      # Skill scripts that inline an engine contract ship their own Python tests (control-surface's
      # `gen_surface.py` today); its live-engine boundary test runs `reuben describe` via `cargo
      # run` to catch format drift (#233) instead of letting the skill rot silently. That `cargo
      # run` uses the same `--features reuben-core/bench` as the clippy/test steps above, so it
      # reuses their compiled artifacts rather than triggering a featureless rebuild. Generic over
      # the skills dir so a future skill's `test_*.py` is picked up without editing CI; each suite
      # runs from its own dir because the tests import their script by bare module name.
      - name: Skill tests (Python)
        run: |
          for d in .claude/skills/*/; do
            if ls "$d"test_*.py >/dev/null 2>&1; then
              echo "== $d ==" && (cd "$d" && python3 -m unittest)
            fi
          done

  windows:
    name: build + test (windows)
    runs-on: windows-latest
    needs: changes
    # Same draft-skip as `check`, AND'd with the workspace path gate. Proves the build + non-audio
    # logic on Windows (ADR-0026): a headless runner can't init WASAPI, so audio out is verified by
    # a manual smoke pass on real hardware — not here. fmt/clippy/lockstep are
    # platform-independent and stay ubuntu-only (`check`); no need to re-run them.
    # No ALSA install: cpal links WASAPI on Windows, and tests open no device.
    if: needs.changes.outputs.windows == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -D warnings # catch platform-gated warnings the Linux build can't see
    steps:
      - uses: actions/checkout@v4

      # Same pinned toolchain as `check`, via the shared composite (ADR-0023).
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      # `--features reuben-core/bench` for parity with `check`: compiles `bench_support` + runs the
      # #30 forcing-function tests on Windows too.
      - name: Test
        run: cargo test --workspace --features reuben-core/bench

  web:
    name: reuben-web (host tests + wasm build)
    runs-on: ubuntu-latest
    needs: changes
    # Same draft-skip as `check`, AND'd with its build-closure path gate. The crate is deliberately
    # detached from the root workspace (issue #224: own `[workspace]` table, path-dep on reuben-core),
    # so the `check` job never touches it — this job is its whole gate: host tests exercise the
    # logic (codec/resolver/decode/shell), then the wasm32 build proves the C-ABI artifact
    # links. No ALSA: the web shell has no cpal.
    if: needs.changes.outputs.web == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: -D warnings
    defaults:
      run:
        working-directory: crates/reuben-web
    steps:
      - uses: actions/checkout@v4

      # Same pinned toolchain as `check`, via the shared composite (ADR-0023).
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      # The composite installs only the host toolchain; the shell's artifact target is added
      # here (the one CI job that needs it).
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/reuben-web

      - name: Format
        run: cargo fmt --check

      - name: Clippy (host)
        run: cargo clippy --all-targets -- -D warnings

      # The bridge module only compiles for wasm32 — lint it on the real target too.
      - name: Clippy (wasm32)
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Test (host)
        run: cargo test

      # The auto-UI inference core + DOM renderer (issue #225) are pure ES modules — no wasm,
      # no browser, no npm install. `node --test` runs widget-model.test.mjs (buildSurface vs the
      # committed oracle) and render.test.mjs on the runner's preinstalled Node.
      - name: Test (JS auto-UI unit tests)
        run: node --test js/surface/*.test.mjs

      - name: Build .wasm (release)
        run: cargo build --release --target wasm32-unknown-unknown

      # The plain-Node direct-call matrix harness (issue #224): instantiates the real .wasm,
      # runs the fetch-on-miss loader from disk, and renders the 20-instrument matrix with
      # per-class assertions + the groovebox /clock/tempo and mic-space duplex checks. Uses
      # the runner's preinstalled Node — no browser, no npm install.
      - name: Node matrix harness
        run: node js/check.mjs

  webapp:
    name: web player app (build + Playwright smoke)
    runs-on: ubuntu-latest
    needs: changes
    # Same draft-skip as the other jobs, AND'd with its build/smoke path gate. The /web app
    # (ADR-0041) is verifiable WITHOUT any Cloudflare secrets — build the wasm, stage the
    # discovered assets, `vite build`, then boot the built app headless and run the smoke.
    # The deploy step (issue #226 PR3) is a separate workflow gated on maintainer-provisioned
    # secrets; this job proves the app itself and merges on its own timeline.
    if: needs.changes.outputs.webapp == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4

      # The staging script builds the release wasm (crates/reuben-web) — same pinned toolchain
      # + wasm target as the `web` job. No ALSA: the web shell has no cpal.
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/reuben-web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install app dependencies
        working-directory: web
        run: npm ci

      # Install the Chromium the smoke drives (matched to the pinned @playwright/test), plus
      # its OS deps. The app pins no browser download elsewhere, so this is the only fetch.
      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      # `npm run build` = stage (build wasm → discover → copy the 9 Toys' transitive assets)
      # then `vite build`. A missing staged asset fails here loudly (no silent drift).
      - name: Build app (wasm + staged assets + bundle)
        working-directory: web
        run: npm run build

      # Boot the built app headless (vite preview, started by Playwright) and assert the
      # pipeline is live: unlock → load groovebox → switch Toy, engine `running`, surface rendered.
      - name: Playwright smoke
        working-directory: web
        run: npm run test:smoke

  bench:
    name: perf gate (macro + micro Ir)
    runs-on: ubuntu-latest
    needs: changes
    # Same draft-skip as `check`, AND'd with the workspace path gate. Runs in parallel — nobody waits
    # on valgrind for fmt/test.
    if: needs.changes.outputs.bench == 'true' && (github.event_name == 'push' || github.event.pull_request.draft == false)
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the baseline commit (PR base / previous push) in history

      # Cache the valgrind .deb so the slow apt-get update + download are skipped
      # on a hit, mirroring the iai-callgrind-runner cache below.
      - name: Cache valgrind .deb
        id: vg-cache
        uses: actions/cache@v4
        with:
          path: ~/valgrind-debs
          # Bump the trailing version to force a refresh of the cached package.
          key: valgrind-deb-1-${{ runner.os }}
      - name: Download valgrind .deb (cache miss)
        if: steps.vg-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          mkdir -p ~/valgrind-debs
          cd ~/valgrind-debs && apt-get download valgrind
      - name: Install valgrind (callgrind backend for iai-callgrind)
        run: sudo apt-get install -y --no-install-recommends ~/valgrind-debs/*.deb

      # Same pinned toolchain as `check`, via the shared composite (ADR-0023).
      - name: Setup pinned Rust toolchain
        uses: ./.github/actions/setup-rust

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      # The runner binary must match the iai-callgrind dev-dependency (0.16.x).
      - name: Cache iai-callgrind-runner
        id: iai-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/iai-callgrind-runner
          key: iai-callgrind-runner-0.16.1-${{ runner.os }}
      - name: Install iai-callgrind-runner
        if: steps.iai-cache.outputs.cache-hit != 'true'
        run: cargo install iai-callgrind-runner --version 0.16.1

      - name: Resolve baseline ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sha="${{ github.event.pull_request.base.sha }}"
          else
            sha="${{ github.event.before }}"
            # New branch / first push reports a null SHA; fall back to the first parent.
            case "$sha" in ""|0000000000000000000000000000000000000000)
              sha="$(git rev-parse HEAD~1 2>/dev/null || echo '')" ;;
            esac
          fi
          echo "sha=$sha" >>"$GITHUB_OUTPUT"

      - name: Compare instruction counts vs baseline (macro render_block + per-operator process)
        run: ./.github/scripts/perf-gate.sh "${{ steps.base.outputs.sha }}"

      # Hand the harvested per-case Ir record (ADR-0019, layer 1) to the persist job. `always()` so a
      # commit that redded the gate is still recorded — its Ir is valid history. `ignore` when the
      # harness didn't compile against its baseline (no comparison ran): an honest gap, not a failure.
      - name: Upload bench-history record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-history-record
          path: bench-history-record.jsonl
          if-no-files-found: ignore
          retention-days: 7

  # Persist the benchmark trend (ADR-0019, layer 1). The ONLY job granted `contents: write`; the gate
  # above stays read-only. Records every main commit's absolute Ir to the `bench-history` orphan
  # branch (not main — no tree churn, no CI re-trigger). `needs: bench` + `always()` so the point is
  # recorded even when the gate failed; never runs for PRs or forks. When `bench` is path-skipped
  # (a main push that changed nothing it benches), this still runs but finds no artifact and the
  # append script no-ops — correctly recording no new point, since no benched code moved.
  bench-history:
    name: persist bench history
    runs-on: ubuntu-latest
    needs: bench
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download bench-history record
        uses: actions/download-artifact@v4
        with:
          name: bench-history-record
          path: _bench_rec
        continue-on-error: true # no artifact (harness didn't run) => append script no-ops
      - name: Append to bench-history branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/bench-history-append.sh _bench_rec/bench-history-record.jsonl
